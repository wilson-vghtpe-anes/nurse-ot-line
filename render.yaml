services:
  - type: web
    name: nurse-ot-line
    runtime: docker
    plan: free
    autoDeployTrigger: commit
    healthCheckPath: /health
    envVars:
      - key: LINE_CHANNEL_ACCESS_TOKEN
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
